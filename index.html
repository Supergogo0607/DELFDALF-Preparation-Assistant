    <style>
        :root {
            --bg-base: #EBEBE6;
            --bg-card: #F5F5F2;
            --bg-hover: #E8E8E3;
            --text-primary: #2C2C2B;
            --text-secondary: #6B6B68;
            --text-muted: #9A9A95;
            --border-soft: #D1D1CB;
            --accent-green: #5E6D62;
            --accent-warm: #A67B7B;
            --accent-gold: #C9A961;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Literata', 'Noto Serif SC', serif;
            line-height: 1.75;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ========== 头部导航 ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-soft);
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Crimson Pro', serif;
        }

        .lang-switch {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-soft);
        }

        .lang-option {
            padding: 8px 16px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            border: none;
            background: transparent;
        }

        .lang-option.active {
            background: var(--text-primary);
            color: var(--bg-base);
        }

        /* ========== 按钮系统 ========== */
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: system-ui, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-base);
        }

        .btn-primary:hover {
            background: var(--accent-green);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-soft);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        /* ========== 模式选择卡片 ========== */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .mode-card {
            background: var(--bg-card);
            border: 2px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .mode-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        .mode-icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .mode-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'Crimson Pro', serif;
        }

        .mode-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* ========== 学习页面（来自Fixed版本）========== */
        .learning-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(255,255,255,0.5);
            border-bottom: 1px solid var(--border-soft);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .progress-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-soft);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-dot.active {
            background: var(--accent-green);
            transform: scale(1.4);
            box-shadow: 0 0 0 6px rgba(94, 109, 98, 0.15);
        }

        .progress-dot.completed {
            background: var(--accent-green);
        }

        .progress-emoji {
            position: absolute;
            top: -32px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        .progress-line {
            width: 32px;
            height: 2px;
            background: var(--border-soft);
        }

        /* ========== 等级徽章 ========== */
        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: var(--accent-green);
            color: white;
        }

        .time-estimate {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(94, 109, 98, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: var(--accent-green);
            font-weight: 600;
        }

        /* ========== 学习内容区 ========== */
        .learning-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            font-family: 'Crimson Pro', serif;
            color: var(--accent-green);
        }

        /* ========== 输入框 ========== */
        textarea, input[type="text"], input[type="password"] {
            width: 100%;
            padding: 20px;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.8;
            background: white;
            color: var(--text-primary);
            transition: all 0.3s;
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(94, 109, 98, 0.08);
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* ========== Markdown 内容 ========== */
        .markdown-content {
            line-height: 1.9;
            color: var(--text-primary);
        }

        .markdown-content h1 {
            font-size: 2rem;
            margin: 1.5rem 0 1rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .markdown-content h2 {
            font-size: 1.75rem;
            margin: 1.5rem 0 1rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .markdown-content h3 {
            font-size: 1.5rem;
            margin: 1.25rem 0 0.75rem;
            font-weight: 600;
        }

        .markdown-content p {
            margin: 1rem 0;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .markdown-content li {
            margin: 0.5rem 0;
        }

        .markdown-content strong {
            font-weight: 600;
            color: var(--accent-green);
        }

        .markdown-content em {
            font-style: italic;
            color: var(--text-secondary);
        }

        .markdown-content code {
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content hr {
            border: none;
            border-top: 2px solid var(--border-soft);
            margin: 2rem 0;
        }

        /* ========== 复习卡片 ========== */
        .flashcard-container {
            max-width: 600px;
            margin: 60px auto;
        }

        .flashcard {
            background: white;
            border: 1px solid var(--border-soft);
            border-radius: 20px;
            padding: 48px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .flashcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .flashcard-type {
            font-size: 11px;
            font-weight: 600;
            background: var(--bg-hover);
            padding: 6px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .flashcard-audio {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--border-soft);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .flashcard-audio:hover {
            border-color: var(--accent-green);
            background: rgba(94, 109, 98, 0.1);
        }

        .flashcard-meaning {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-style: italic;
            line-height: 1.6;
        }

        .flashcard-input {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            text-align: center;
            border: 2px solid var(--border-soft);
            border-radius: 12px;
            margin-bottom: 24px;
            font-family: 'Crimson Pro', serif;
        }

        .memory-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            margin-top: 24px;
        }

        .memory-buttons.show {
            opacity: 1;
        }

        .memory-btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 10px;
            border: 2px solid;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 14px;
        }

        .memory-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .memory-btn.proficient {
            border-color: #10B981;
            color: #10B981;
        }

        .memory-btn.proficient:hover {
            background: #10B981;
            color: white;
        }

        .memory-btn.hesitant {
            border-color: #F59E0B;
            color: #F59E0B;
        }

        .memory-btn.hesitant:hover {
            background: #F59E0B;
            color: white;
        }

        .memory-btn.forgotten {
            border-color: var(--accent-warm);
            color: var(--accent-warm);
        }

        .memory-btn.forgotten:hover {
            background: var(--accent-warm);
            color: white;
        }

        /* ========== API配置 ========== */
        .api-setup {
            background: #FFF9E6;
            border: 2px dashed var(--accent-gold);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .warning-badge {
            display: inline-block;
            background: var(--accent-gold);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* ========== 加载与动画 ========== */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-soft);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 60px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== Toast 通知 ========== */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--text-primary);
            color: var(--bg-base);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== 工具类 ========== */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-20 { margin-top: 20px; }
        .mb-20 { margin-bottom: 20px; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-12 { gap: 12px; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .mode-grid {
                grid-template-columns: 1fr;
            }
            
            .learning-header {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }
            
            .content-card {
                padding: 24px;
            }
            
            .flashcard {
                padding: 32px 24px;
            }
        }
    </style>
</head>

                this.currentMode = null;
                this.currentPhase = 0;

                this.articleText = '';
                this.learningData = {
                    vocabulary: '',
                    cloze: '',
                    feedback: '',
                    flashcards: []
                };
                this.reviewSchedule = [];
                this.loadReviewSchedule();
            }

            t(key) {
                const keys = key.split('.');
                let value = TRANSLATIONS[this.currentLang];
                for (const k of keys) {
                    value = value?.[k];
                }
                return value || key;
            }

            setLanguage(lang) {
                this.currentLang = lang;
                localStorage.setItem('app_lang', lang);
            }

            setApiKey(key) {
                this.apiKey = key;
                localStorage.setItem('anthropic_api_key', key);
            }

            setLevel(level) {
                this.userLevel = level;
                localStorage.setItem('user_level', level);
            }

            loadReviewSchedule() {
                const data = localStorage.getItem('review_schedule');
                if (data) {
                    try {
                        this.reviewSchedule = JSON.parse(data);
                    } catch (e) {
                        this.reviewSchedule = [];
                    }
                }
            }

            saveReviewSchedule() {
                localStorage.setItem('review_schedule', JSON.stringify(this.reviewSchedule));
            }

            getTodayReviews() {
                const today = new Date().toISOString().split('T')[0];
                return this.reviewSchedule.filter(r => r.reviewDate === today);
            }

            calculateEstimatedTime(text) {
                if (!text || !this.userLevel) return 15;
                
                const wordCount = text.trim().split(/\s+/).length;
                const baseRates = {
                    A1: 8, A2: 6, B1: 5, B2: 4, C1: 3, C2: 2.5
                };
                
                const rate = baseRates[this.userLevel] || 5;
                let time = Math.ceil((wordCount / 100) * rate);
                time += 13; // 练习和复习时间
                
                return Math.max(8, Math.min(60, time));
            }
        }

        // ==================== Claude API ====================
        async function callClaude(userMessage, systemPrompt) {
            if (!state.apiKey) {
                showToast(state.t('noApiKey'));
                throw new Error('No API Key');
            }

            const payload = {
                model: 'claude-sonnet-4-20250514',
                max_tokens: 4000,
                system: systemPrompt,
                messages: [{ role: 'user', content: userMessage }]
            };

            try {
                let response;

                if (CONFIG.WORKER_URL) {
                    // 通过Cloudflare Worker代理（推荐，API Key在后端）
                    response = await fetch(CONFIG.WORKER_URL + '/api/claude', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // 直连（本地调试或未配置Worker时使用）
                    response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': state.apiKey,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify(payload)
                    });
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API Error');
                }

                const data = await response.json();
                const text = data.content.find(c => c.type === 'text')?.text || '';
                return marked.parse(text);
            } catch (error) {
                console.error('Claude API Error:', error);
                showToast(state.t('error') + ': ' + error.message);
                throw error;
            }
        }

                            <button class="btn btn-secondary" onclick="downloadPdf()">${state.t('downloadPdf')} 📄</button>
                            <button class="btn btn-secondary" onclick="savePracticeRecord('${state.userLevel}')">${state.t('saveRecord')} 💾</button>
                            <button class="btn btn-primary" onclick="nextPhase()">${state.t('next')}</button>
                        </div>
                    </div>
                `;
            } catch (e) {
                showToast(state.t('error'));
            }
        }

        async function generateFlashcards() {
            // 简化：直接从词汇学习中提取
            state.learningData.flashcards = [
                { word: 'exemple', meaning: '例子', type: 'NOM' },
                { word: 'comprendre', meaning: '理解', type: 'VERBE' }
            ];
            
            document.getElementById('phase-content').innerHTML = `
                <div class="text-center">
                    <button class="btn btn-primary" onclick="startReviewFromLearning()">${state.t('startReview')}</button>
                </div>
            `;
        }

        function startReviewFromLearning() {
            state.currentMode = 'review';
            // 将学习的词汇加入复习计划
            state.learningData.flashcards.forEach(card => {
                state.reviewSchedule.push({
                    word: card.word,
                    meaning: card.meaning,
                    type: card.type,
                    reviewDate: new Date().toISOString().split('T')[0],
                    level: 1,
                    attempt: 0
                });
            });
            state.saveReviewSchedule();
            render();
        }

        function checkFlashcard(event, correctWord) {
            if (event.key === 'Enter') {
                const input = event.target;
                const userInput = input.value.trim().toLowerCase();
                const correct = correctWord.toLowerCase();
                
                if (userInput === correct) {
                    input.style.borderColor = 'var(--accent-green)';
                    input.style.color = 'var(--accent-green)';
                    document.getElementById('memory-buttons').classList.add('show');
                    showToast(state.t('success'));
                } else {
                    input.style.borderColor = 'var(--accent-warm)';
                    input.style.color = 'var(--accent-warm)';
                }
            }
        }

        function recordMemory(level, word) {
            const intervals = {
                3: [1, 3, 7, 15, 30],
                2: [1, 2, 4, 8, 16],
                1: [0.5, 1, 2, 4, 8]
            };
            
            const schedule = intervals[level];
            const today = new Date();
            
            state.reviewSchedule = state.reviewSchedule.filter(r => r.word !== word);
            
            schedule.forEach((days, index) => {
                const date = new Date(today);
                date.setDate(date.getDate() + Math.ceil(days));
                state.reviewSchedule.push({
                    word,
                    meaning: state.getTodayReviews()[0]?.meaning || '',
                    reviewDate: date.toISOString().split('T')[0],
                    level,
                    attempt: index + 1
                });
            });
            
            state.saveReviewSchedule();
            showToast(state.t('saved'));
            
            setTimeout(() => {
                render();
            }, 1000);
        }

        function playAudio(word) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.8;

            // 等待声音列表加载完毕后筛选最佳法语声音
            function speakWithBestVoice() {
                const voices = window.speechSynthesis.getVoices();
                // 优先顺序：Google法语 > 任何fr-FR > 任何fr > 默认
                const preferred = [
                    voices.find(v => v.name.includes('Google') && v.lang.startsWith('fr')),
                    voices.find(v => v.lang === 'fr-FR'),
                    voices.find(v => v.lang.startsWith('fr')),
                ].find(Boolean);
                if (preferred) utterance.voice = preferred;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }

            if (window.speechSynthesis.getVoices().length > 0) {
                speakWithBestVoice();
            } else {
                window.speechSynthesis.onvoiceschanged = speakWithBestVoice;
            }
        }

        // ==================== PDF 下载 ====================
        function downloadPdf() {
            showToast(state.t('pdfGenerating'));

            const date = new Date().toLocaleDateString('fr-FR');
            const level = state.userLevel || '';

            // 构建PDF内容
            const pdfContainer = document.createElement('div');
            pdfContainer.style.cssText = 'padding: 40px; font-family: serif; color: #2C2C2B; max-width: 800px;';
            pdfContainer.innerHTML = `
                <div style="text-align:center; margin-bottom: 32px; border-bottom: 2px solid #5E6D62; padding-bottom: 20px;">
                    <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px;">DALF Rédacteur Pro</h1>
                    <p style="color: #6B6B68;">Niveau ${level} · ${date}</p>
                </div>
                ${state.learningData.vocabulary ? `<h2 style="color:#5E6D62; margin: 24px 0 12px;">📚 Vocabulaire</h2><div>${state.learningData.vocabulary}</div><hr style="margin:24px 0;">` : ''}
                ${state.learningData.cloze ? `<h2 style="color:#5E6D62; margin: 24px 0 12px;">✍️ Exercices</h2><div>${state.learningData.cloze}</div><hr style="margin:24px 0;">` : ''}
                ${state.learningData.feedback ? `<h2 style="color:#5E6D62; margin: 24px 0 12px;">✅ Corrections</h2><div>${state.learningData.feedback}</div>` : ''}
            `;
            document.body.appendChild(pdfContainer);

            const opt = {
                margin: [10, 10, 10, 10],
                filename: `DALF_${level}_${date.replace(/\//g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfContainer).save().then(() => {
                document.body.removeChild(pdfContainer);
            });
        }

        // ==================== 练习记录存档 ====================
        async function savePracticeRecord(level) {
            const sessionData = {
                date: new Date().toISOString(),
                level: level,
                article_excerpt: state.articleText.substring(0, 200),
                vocabulary_count: (state.learningData.vocabulary.match(/###/g) || []).length,
                has_feedback: !!state.learningData.feedback,
                lang: state.currentLang
            };

            // 1. 本地存档（始终可用）
            const history = JSON.parse(localStorage.getItem('practice_history') || '[]');
            history.unshift(sessionData);
            localStorage.setItem('practice_history', JSON.stringify(history.slice(0, 50))); // 保留最近50条

            // 2. Supabase云端存档（若已配置）
            await saveSessionToSupabase(sessionData);

            showToast(state.t('recordSaved'));
        }

        
            const input = document.getElementById('import-input');
            const lines = input.value.trim().split('\n');
            
            let count = 0;
            lines.forEach(line => {
                const [word, meaning] = line.split('|').map(s => s.trim());
                if (word && meaning) {
                    state.reviewSchedule.push({
                        word,
                        meaning,
                        reviewDate: new Date().toISOString().split('T')[0],
                        level: 1,
                        attempt: 0,
                        type: 'IMPORTED'
                    });
                    count++;
                }
            });
            
            state.saveReviewSchedule();
            showToast(`${state.t('success')}: ${count} ${state.t('words')}`);
            
            setTimeout(() => {
                state.currentMode = 'review';
                render();
            }, 1000);
        }

        function showPhaseContent() {
            // 占位函数
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== 初始化 ====================
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        window.addEventListener('DOMContentLoaded', () => {
            render();
            // 触发一次字数统计
            setTimeout(updateWordCount, 100);
        });

        // 导出函数
        window.setLanguage = setLanguage;
        window.saveApiKey = saveApiKey;
        window.selectMode = selectMode;
        window.backToModes = backToModes;
        window.selectLevel = selectLevel;
        window.backToPhase0 = backToPhase0;
        window.updateWordCount = updateWordCount;
        window.startLearning = startLearning;
        window.nextPhase = nextPhase;
        window.submitAnswer = submitAnswer;
        window.startReviewFromLearning = startReviewFromLearning;
        window.checkFlashcard = checkFlashcard;
        window.recordMemory = recordMemory;
        window.playAudio = playAudio;
        window.importVocabulary = importVocabulary;
        window.downloadPdf = downloadPdf;
        window.savePracticeRecord = savePracticeRecord;
    </script>
</body>
</html>
