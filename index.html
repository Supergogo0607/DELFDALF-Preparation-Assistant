        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Literata', 'Noto Serif SC', serif; line-height: 1.75; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-soft); margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 700; font-family: 'Crimson Pro', serif; }
        .lang-switch { display: flex; gap: 4px; background: var(--bg-card); padding: 4px; border-radius: 10px; border: 1px solid var(--border-soft); }
        .lang-option { padding: 8px 16px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); border: none; background: transparent; }
        .lang-option.active { background: var(--text-primary); color: var(--bg-base); }
        .btn { padding: 12px 24px; border-radius: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-family: system-ui, sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary { background: var(--text-primary); color: var(--bg-base); }
        .btn-primary:hover { background: var(--accent-green); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-soft); }
        .btn-secondary:hover { background: var(--bg-hover); }
        .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-top: 40px; }
        .mode-card { background: var(--bg-card); border: 2px solid var(--border-soft); border-radius: 16px; padding: 40px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .mode-card:hover { border-color: var(--accent-green); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
        .mode-icon { font-size: 56px; margin-bottom: 20px; }
        .mode-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; font-family: 'Crimson Pro', serif; }
        .mode-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }
        .learning-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255,255,255,0.5); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
        .progress-nav { display: flex; align-items: center; gap: 12px; }
        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-soft); transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; }
        .progress-dot.active { background: var(--accent-green); transform: scale(1.4); box-shadow: 0 0 0 6px rgba(94,109,98,0.15); }
        .progress-dot.completed { background: var(--accent-green); }
        .progress-emoji { position: absolute; top: -32px; left: 50%; transform: translateX(-50%); font-size: 20px; }
        .progress-line { width: 32px; height: 2px; background: var(--border-soft); }
        .level-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; background: var(--accent-green); color: white; }
        .time-estimate { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(94,109,98,0.1); border-radius: 8px; font-size: 13px; color: var(--accent-green); font-weight: 600; }
        .learning-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .content-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 16px; padding: 40px; margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .section-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; font-family: 'Crimson Pro', serif; color: var(--accent-green); }
        textarea, input[type="text"], input[type="password"] { width: 100%; padding: 20px; border: 1px solid var(--border-soft); border-radius: 12px; font-family: inherit; font-size: 16px; line-height: 1.8; background: white; color: var(--text-primary); transition: all 0.3s; resize: vertical; }

        .markdown-content h1 { font-size: 2rem; margin: 1.5rem 0 1rem; font-weight: 700; color: var(--accent-green); }
        .markdown-content h2 { font-size: 1.75rem; margin: 1.5rem 0 1rem; font-weight: 700; color: var(--accent-green); }
        .markdown-content h3 { font-size: 1.5rem; margin: 1.25rem 0 0.75rem; font-weight: 600; }

        .markdown-content li { margin: 0.5rem 0; }
        .markdown-content strong { font-weight: 600; color: var(--accent-green); }
        .markdown-content em { font-style: italic; color: var(--text-secondary); }

        .markdown-content hr { border: none; border-top: 2px solid var(--border-soft); margin: 2rem 0; }

        .score-banner.ok { background: rgba(245,158,11,0.1); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
        .score-banner.poor { background: rgba(166,123,123,0.1); color: var(--accent-warm); border: 1px solid rgba(166,123,123,0.3); }

        .writing-guide { margin: 16px 0; border: 1px solid var(--accent-gold); border-radius: 12px; overflow: hidden; }
        .writing-guide-header { padding: 12px 16px; background: rgba(201,169,97,0.1); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; color: var(--accent-gold); user-select: none; }
        .writing-guide-header:hover { background: rgba(201,169,97,0.15); }
        .writing-guide-body { padding: 16px 20px; background: rgba(201,169,97,0.04); display: none; font-size: 14px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }
        .writing-guide-body.open { display: block; }
        .writing-guide-arrow { transition: transform 0.2s; }
        .writing-guide-arrow.open { transform: rotate(180deg); }

        /* ===== 精批报告样式 ===== */
        .report-card { margin-top: 24px; border: 1px solid var(--border-soft); border-radius: 12px; overflow: hidden; }
        .report-item { padding: 14px 18px; border-bottom: 1px solid var(--border-soft); display: flex; gap: 12px; align-items: flex-start; }
        .report-item:last-child { border-bottom: none; }
        .report-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
        .report-content { flex: 1; }
        .report-word { font-weight: 700; font-family: 'Crimson Pro', serif; font-size: 16px; }
        .report-reason { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        @media (max-width: 768px) {
            .mode-grid { grid-template-columns: 1fr; }
            .learning-header { flex-direction: column; gap: 16px; padding: 16px; }
            .content-card { padding: 24px; }
            .flashcard { padding: 32px 24px; }
        }
    </style>

// ==================== ÉTAT ====================
class AppState {
    constructor() {
        this.lang = localStorage.getItem('app_lang') || 'zh';
        this.currentMode = null;
        this.currentPhase = 0;
        this.userLevel = localStorage.getItem('user_level') || null;
        this.articleText = '';
        this.learningData = { vocabulary: '', vocabularyChunks: [], cloze: '', clozeData: null, feedback: '' };
        this.reviewSchedule = [];
        this._loadReviewSchedule();
    }

    t(key) {
        const keys = key.split('.');
        let v = T[this.lang];
        for (const k of keys) v = v?.[k];
        return v || key;
    }

    setLang(lang) { this.lang = lang; localStorage.setItem('app_lang', lang); }
    setLevel(level) { this.userLevel = level; localStorage.setItem('user_level', level); }

    _loadReviewSchedule() {
        try { this.reviewSchedule = JSON.parse(localStorage.getItem('review_schedule') || '[]'); }
        catch(e) { this.reviewSchedule = []; }
    }

    saveReviewSchedule() { localStorage.setItem('review_schedule', JSON.stringify(this.reviewSchedule)); }

    saveProgress() {
        localStorage.setItem('session_progress', JSON.stringify({
            currentMode: this.currentMode, currentPhase: this.currentPhase,
            userLevel: this.userLevel, articleText: this.articleText,
            learningData: this.learningData, savedAt: new Date().toISOString()
        }));
    }

    loadProgress() {
        try { return JSON.parse(localStorage.getItem('session_progress')); } catch(e) { return null; }
    }

    restoreProgress(s) {
        this.currentMode = s.currentMode; this.currentPhase = s.currentPhase;
        this.userLevel = s.userLevel; this.articleText = s.articleText;
        this.learningData = s.learningData;
    }

    clearProgress() { localStorage.removeItem('session_progress'); }

    getTodayReviews() {
        const today = new Date().toISOString().split('T')[0];
        return this.reviewSchedule.filter(r => r.reviewDate === today);
    }

    calcTime(text) {
        if (!text || !this.userLevel) return 15;
        const wc = text.trim().split(/\s+/).length;
        const rates = { A1:8, A2:6, B1:5, B2:4, C1:3, C2:2.5 };
        return Math.max(8, Math.min(60, Math.ceil((wc/100) * (rates[this.userLevel]||5)) + 13));
    }

    addChunksToReview(chunks) {
        const today = new Date().toISOString().split('T')[0];
        let added = 0;
        chunks.forEach(c => {
            if (c.word && c.meaning && !this.reviewSchedule.some(r => r.word === c.word)) {
                this.reviewSchedule.push({
                    word: c.word, meaning: c.meaning, example: c.example || '',
                    type: c.type || 'EXPRESSION', reviewDate: today, level: 1, attempt: 0
                });
                added++;
            }
        });
        this.saveReviewSchedule();
        return added;
    }
}

async function callClaude(userMsg, sysPrompt, raw=false) {
    const res = await fetch(CONFIG.WORKER_URL + '/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 3000,
            system: sysPrompt,
            messages: [{ role: 'user', content: userMsg }]
        })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API Error'); }
    const data = await res.json();
    const text = data.content.find(c => c.type === 'text')?.text || '';
    return raw ? text : marked.parse(text);
}

// ==================== 解析函数 ====================
function parseChunks(rawText) {
    try {
        const m = rawText.match(/```json\s*([\s\S]*?)\s*```/);
        if (!m) return [];
        const arr = JSON.parse(m[1]);
        return Array.isArray(arr) ? arr.filter(c => c.word && c.meaning) : [];
    } catch(e) { return []; }
}

function parseClozeData(rawText) {
    try {
        const m = rawText.match(/```json\s*([\s\S]*?)\s*```/);
        if (!m) return null;
        return JSON.parse(m[1]);
    } catch(e) { return null; }
}

// ==================== 法语字符标准化（忽略变音符）====================
function normalizeFr(str) {
    return str.toLowerCase()
        .replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[îï]/g,'i')
        .replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/[ç]/g,'c')
        .replace(/[œ]/g,'oe').replace(/[æ]/g,'ae')
        .replace(/['\u2019\u2018]/g,"'")
        .replace(/\s+/g,' ').trim();
}

function isAnswerCorrect(userInput, correctAnswer) {
    const u = normalizeFr(userInput);
    const c = normalizeFr(correctAnswer);
    if (u === c) return true;
    // 允许轻微差异：去掉所有空格和标点再比较
    const uClean = u.replace(/[\s\-'.]/g,'');
    const cClean = c.replace(/[\s\-'.]/g,'');
    return uClean === cClean;
}

// ==================== 填空交互逻辑 ====================
function handleClozeKey(event, id) {
    if (event.key === 'Enter') {
        checkClozeAnswer(id);
    }
}

function handleClozeInput(event, id) {
    // 实时清除错误状态，让用户重新尝试
    const inp = event.target;
    if (inp.classList.contains('wrong')) {
        inp.classList.remove('wrong');
    }
}

function checkClozeAnswer(id) {
    const inp = document.getElementById(`cloze-${id}`);
    if (!inp || inp.disabled) return;

    const userVal = inp.value.trim();
    if (!userVal) return;

    const correct = inp.dataset.answer;
    const attempts = parseInt(inp.dataset.attempts) + 1;
    inp.dataset.attempts = attempts;

    const attEl = document.getElementById(`cloze-att-${id}`);

    if (isAnswerCorrect(userVal, correct)) {
        inp.classList.remove('wrong');
        inp.classList.add('correct');
        inp.disabled = true;
        if (attEl) attEl.textContent = '✓';
        checkAllFilled();
    } else {
        inp.classList.add('wrong');
        if (attempts >= 3) {
            // 3次错误，显示答案
            inp.value = correct;
            inp.classList.remove('wrong');
            inp.classList.add('revealed');
            inp.disabled = true;
            if (attEl) attEl.textContent = '（已显示）';
            checkAllFilled();
        } else {
            if (attEl) attEl.textContent = `${attempts}/3`;
            inp.select();
        }
    }
}

function checkAllFilled() {
    const inputs = document.querySelectorAll('.cloze-input');
    const allDone = Array.from(inputs).every(inp => inp.disabled);
    if (!allDone) return;

    // 统计分数
    let correct = 0, wrong = 0, revealed = 0;
    inputs.forEach(inp => {
        if (inp.classList.contains('correct')) correct++;
        else if (inp.classList.contains('revealed')) revealed++;
        else wrong++;
    });
    const total = inputs.length;

    // 显示分数banner
    const banner = document.getElementById('fill-score-banner');
    if (banner) {
        const ratio = correct / total;
        let cls = ratio >= 0.8 ? 'good' : ratio >= 0.5 ? 'ok' : 'poor';
        const tkey = ratio >= 0.8 ? 'scoreGood' : ratio >= 0.5 ? 'scoreOk' : 'scorePoor';
        const msg = state.t(tkey).replace('{n}', `${correct}/${total}`);
        banner.className = `score-banner ${cls}`;
        banner.textContent = msg;
        banner.style.display = 'block';

        // 显示精批报告按钮
        const reportBtn = document.getElementById('generate-report-btn');
        if (reportBtn) reportBtn.style.display = 'inline-block';

        // 存储答题记录供精批使用
        state._clozeResults = Array.from(inputs).map(inp => ({
            id: parseInt(inp.id.replace('cloze-','')),
            userAnswer: inp.dataset.userAnswer || inp.value,
            correctAnswer: inp.dataset.answer,
            status: inp.classList.contains('correct') ? 'correct' : inp.classList.contains('revealed') ? 'revealed' : 'wrong'
        }));
    }
}

async function generateReport() {
    const btn = document.getElementById('generate-report-btn');
    if (btn) { btn.disabled = true; btn.textContent = state.t('generatingReport'); }

    const reportContainer = document.getElementById('report-container');
    if (reportContainer) reportContainer.innerHTML = `<div class="text-center" style="padding:40px 0;"><div class="spinner"></div></div>`;

    try {
        const results = state._clozeResults || [];
        const clozeData = state.learningData.clozeData;
        const questions = clozeData?.fill_in || [];

        const userAnswerSummary = results.map(r => {
            const q = questions.find(q => q.id === r.id);
            return `题${r.id}：句子="${q?.sentence||''}"，正确答案="${r.correctAnswer}"，学生答案="${r.userAnswer}"，状态=${r.status}`;
        }).join('\n');

        const prompts = getPrompts();
        const rawReport = await callClaude(
            `请分析以下填空题的答题情况：\n\n${userAnswerSummary}`,
            prompts.report, true
        );

        const reportItems = parseClozeData(rawReport);

        if (reportContainer && Array.isArray(reportItems)) {
            const html = reportItems.map(item => {
                const icon = item.status === 'correct' ? '✅' : item.status === 'revealed' ? '💡' : '❌';
                return `<div class="report-item">
                    <div class="report-icon">${icon}</div>
                    <div class="report-content">
                        <div class="report-word">${item.correct_answer}</div>
                        <div class="report-reason">${item.explanation}</div>
                        ${item.status !== 'correct' ? `<div class="report-reason" style="color:var(--accent-warm);">你的答案：${item.user_answer||'（未作答）'}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
            reportContainer.innerHTML = `<h3 style="margin-bottom:16px;color:var(--accent-green);">${state.t('reportTitle')}</h3><div class="report-card">${html}</div>`;
        }

        if (btn) { btn.disabled = false; btn.textContent = state.t('checkAnswers'); }
    } catch(e) {
        if (reportContainer) reportContainer.innerHTML = `<p style="color:var(--accent-warm);">生成报告失败，请重试</p>`;
        if (btn) { btn.disabled = false; btn.textContent = state.t('checkAnswers'); }
    }
}

    if (!state.currentMode) { app.innerHTML = renderHome(); return; }
    if (state.currentMode === 'learning') {

function setLanguage(lang) {
    state.setLang(lang);
    document.querySelectorAll('.lang-option').forEach(b => b.classList.toggle('active', b.dataset.lang===lang));
    render();
}

function selectMode(m) { state.currentMode=m; state.currentPhase=0; render(); }
function selectLevel(lv) { state.setLevel(lv); render(); }
function backToHome() { state.currentMode=null; state.currentPhase=0; state.clearProgress(); render(); }

function updateWC() {
    const el=document.getElementById('article-input');
    if(!el) return;
    state.articleText=el.value;
    const wc=el.value.trim().split(/\s+/).filter(w=>w).length;
    const c=document.getElementById('wc');
    if(c) c.textContent=`${wc} ${state.t('wordCount')}`;
}

async function startLearning() {
    const uses = parseInt(localStorage.getItem('use_count') || '0');
    if(uses >= CONFIG.MAX_USES) { showToast('内测次数已用完，感谢参与！'); return; }
    const wordCount = state.articleText.trim().split(/\s+/).length;
    if(wordCount > 800) { showToast('文章请控制在800字以内'); return; }
    localStorage.setItem('use_count', uses + 1);

    const el=document.getElementById('article-input');
    state.articleText=el?.value.trim();
    if(!state.articleText){showToast(state.t('noInput'));return;}
    state.currentPhase=1; render(); showLoading();

    try {
        const p=getPrompts();
        const raw=await callClaude(`请分析以下文章：\n\n${state.articleText}`, p.vocab, true);
        const chunks=parseChunks(raw);
        const md=raw.replace(/```json[\s\S]*?```/g,'').trim();
        state.learningData.vocabulary=marked.parse(md);
        state.learningData.vocabularyChunks=chunks;
        state.saveProgress();

        const added=state.addChunksToReview(chunks);
        if(chunks.length>0) await sbInsert('vocabulary', chunks.map(c=>({
            word:c.word, meaning:c.meaning, example:c.example||'', level:state.userLevel, created_at:new Date().toISOString()
        })));

        document.getElementById('phase-content').innerHTML=`
            <div class="content-card">
                <h2 class="section-title">${state.t('phase1')}</h2>
                <div class="markdown-content">${state.learningData.vocabulary}</div>
                ${added>0?`<div class="chunk-added-banner">✅ ${added} ${state.t('chunksAdded')}</div>`:''}
                <div class="text-center mt-20">
                    <button class="btn btn-primary" onclick="nextPhase()">${state.t('next')}</button>
                </div>
            </div>`;
    } catch(e) { showToast(state.t('error')+': '+e.message); state.currentPhase=0; render(); }
}

async function nextPhase() {
    if(state.currentPhase>=4) return;
    state.currentPhase++; render();
    if(state.currentPhase===2) await genCloze();
    else if(state.currentPhase===4) showFlashcardEntry();
}

async function genCloze() {
    showLoading(state.t('generatingExercise'));
    try {
        const p=getPrompts();
        const chunkList=state.learningData.vocabularyChunks.map(c=>c.word).join('、');
        const rawCloze=await callClaude(`文章：${state.articleText}\n\n已学词块：${chunkList}`, p.cloze, true);

        // 解析结构化数据
        const clozeData = parseClozeData(rawCloze);
        state.learningData.clozeData = clozeData;

        // 去掉JSON块，保留Markdown展示
        const clozeMarkdown = marked.parse(rawCloze.replace(/```json[\s\S]*?```/g,'').trim());
        state.learningData.cloze = clozeMarkdown;
        state.saveProgress();

        // 渲染交互式填空
        const interactiveHtml = renderClozeInteractive(clozeMarkdown, clozeData);
        const writingHtml = buildWritingSection(clozeData?.writing_topic || '请根据文章主题，运用今天学习的词块写一段话。');

        document.getElementById('phase-content').innerHTML=`
            <div class="content-card">
                <h2 class="section-title">${state.t('phase2')}</h2>
                ${interactiveHtml}
                ${writingHtml}
            </div>`;
    } catch(e) { showToast(state.t('error')+': '+e.message); }
}

    const n=state.learningData.vocabularyChunks.length;
    document.getElementById('phase-content').innerHTML=`
        <div class="content-card text-center">
            <h2 class="section-title">${state.t('phase4')}</h2>
            <p style="color:var(--text-secondary);margin-bottom:32px;">${n} ${state.t('words')} ${state.t('chunksAdded')}</p>
            <div class="flex gap-12" style="justify-content:center;">
                <button class="btn btn-secondary" onclick="backToHome()">${state.t('back')}</button>
                <button class="btn btn-primary" onclick="goReview()">${state.t('startReview')}</button>
            </div>

}

function goReview() { state.clearProgress(); state.currentMode='review'; render(); }

function checkFC(e, w) {
    if(e.key!=='Enter') return;
    const inp=e.target;
    const ok=inp.value.trim().toLowerCase()===w.toLowerCase();
    inp.style.borderColor=ok?'var(--accent-green)':'var(--accent-warm)';
    inp.style.color=ok?'var(--accent-green)':'var(--accent-warm)';
    if(ok){ document.getElementById('mem-btns').classList.add('show'); showToast(state.t('success')); }
}

function recordMem(lvl, word) {
    const iv={3:[1,3,7,15,30], 2:[1,2,4,8,16], 1:[0.5,1,2,4,8]};
    const card=state.reviewSchedule.find(r=>r.word===word);
    state.reviewSchedule=state.reviewSchedule.filter(r=>r.word!==word);
    iv[lvl].forEach((d,i)=>{
        const dt=new Date(); dt.setDate(dt.getDate()+Math.ceil(d));
        state.reviewSchedule.push({
            word, meaning:card?.meaning||'', example:card?.example||'',
            type:card?.type||'EXPRESSION', reviewDate:dt.toISOString().split('T')[0], level:lvl, attempt:i+1
        });
    });
    state.saveReviewSchedule();
    showToast(state.t('saved'));
    setTimeout(()=>render(), 1000);
}

function playAudio(word) {
    const u=new SpeechSynthesisUtterance(word);
    u.lang='fr-FR'; u.rate=0.8;
    function speak() {
        const vs=window.speechSynthesis.getVoices();
        const v=[vs.find(v=>v.name.includes('Google')&&v.lang.startsWith('fr')),vs.find(v=>v.lang==='fr-FR'),vs.find(v=>v.lang.startsWith('fr'))].find(Boolean);
        if(v) u.voice=v;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    }
    window.speechSynthesis.getVoices().length>0 ? speak() : (window.speechSynthesis.onvoiceschanged=speak);
}

    showToast(state.t('pdfGenerating'));
    const date=new Date().toLocaleDateString('fr-FR');
    const lv=state.userLevel||'';
    const div=document.createElement('div');
    div.style.cssText='padding:40px;font-family:serif;color:#2C2C2B;max-width:800px;';
    div.innerHTML=`
        <div style="text-align:center;margin-bottom:32px;border-bottom:2px solid #5E6D62;padding-bottom:20px;">
            <h1 style="font-size:28px;font-weight:700;margin-bottom:8px;">DALF Rédacteur Pro</h1>
            <p style="color:#6B6B68;">Niveau ${lv} · ${date}</p>
        </div>
        ${state.learningData.vocabulary?`<h2 style="color:#5E6D62;margin:24px 0 12px;">📚 Expressions</h2><div>${state.learningData.vocabulary}</div><hr style="margin:24px 0;">`:''}
        ${state.learningData.cloze?`<h2 style="color:#5E6D62;margin:24px 0 12px;">✍️ Exercices</h2><div>${state.learningData.cloze}</div><hr style="margin:24px 0;">`:''}

async function saveRecord() {
    const d={
        date:new Date().toISOString(), level:state.userLevel,
        article_excerpt:state.articleText.substring(0,200),
        vocabulary_count:state.learningData.vocabularyChunks.length,
        has_feedback:!!state.learningData.feedback, lang:state.lang
    };
    const h=JSON.parse(localStorage.getItem('practice_history')||'[]');
    h.unshift(d);
    localStorage.setItem('practice_history', JSON.stringify(h.slice(0,50)));
    await sbInsert('practice_sessions',[d]);
    showToast(state.t('recordSaved'));
}

function doImport() {
    const inp=document.getElementById('import-input');
    const chunks=inp.value.trim().split('\n').map(l=>{
        const [word,meaning]=l.split('|').map(s=>s.trim());
        return word&&meaning?{word,meaning,type:'IMPORTED'}:null;
    }).filter(Boolean);
    const added=state.addChunksToReview(chunks);
    showToast(`${state.t('success')}: ${added} ${state.t('words')}`);
    setTimeout(()=>{state.currentMode='review';render();},1000);
}

function showToast(msg) {
    const t=document.createElement('div');
    t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3000);
}

function restorePhase(phase, ld) {
    const pc=document.getElementById('phase-content');
    if(!pc) return;
    if(phase===1&&ld.vocabulary) {
        pc.innerHTML=`<div class="content-card">
            <h2 class="section-title">${state.t('phase1')}</h2>
            <div class="markdown-content">${ld.vocabulary}</div>
            <div class="text-center mt-20"><button class="btn btn-primary" onclick="nextPhase()">${state.t('next')}</button></div>
        </div>`;
    } else if(phase===2&&ld.cloze) {
        const interactiveHtml = renderClozeInteractive(ld.cloze, ld.clozeData||null);
        const writingHtml = buildWritingSection(ld.clozeData?.writing_topic||'请根据文章主题写一段话。');
        pc.innerHTML=`<div class="content-card">
            <h2 class="section-title">${state.t('phase2')}</h2>
            ${interactiveHtml}${writingHtml}
        </div>`;
    } else if(phase===3&&ld.feedback) {
        pc.innerHTML=`<div class="content-card">
            <h2 class="section-title">${state.t('phase3')}</h2>
            <div class="markdown-content">${ld.feedback}</div>
            <div class="flex gap-12 mt-20" style="justify-content:center;flex-wrap:wrap;">
                <button class="btn btn-secondary" onclick="dlPdf()">${state.t('downloadPdf')} 📄</button>
                <button class="btn btn-secondary" onclick="saveRecord()">${state.t('saveRecord')} 💾</button>
                <button class="btn btn-primary" onclick="nextPhase()">${state.t('next')}</button>
            </div>
        </div>`;
    }
}

// ==================== INIT ====================
marked.setOptions({breaks:true, gfm:true});

window.addEventListener('DOMContentLoaded', ()=>{
    const saved=state.loadProgress();
    if(saved&&saved.currentPhase>0&&saved.articleText) {
        const mins=Math.round((Date.now()-new Date(saved.savedAt))/60000);
        const label=mins<60?`${mins}分钟前`:`${Math.round(mins/60)}小时前`;
        const resume=confirm(`${state.t('resumeTitle')}（${label}，等级 ${saved.userLevel}）\n\n是否继续？点击"取消"重新开始`);
        if(resume){ state.restoreProgress(saved); render(); setTimeout(()=>restorePhase(saved.currentPhase,saved.learningData),100); }
        else { state.clearProgress(); render(); }
    } else { render(); }
    setTimeout(()=>{ const el=document.getElementById('article-input'); if(el){const e=new Event('input');el.dispatchEvent(e);} },100);
});

Object.assign(window,{
    setLanguage, selectMode, selectLevel, backToHome, updateWC,
    startLearning, nextPhase, submitWriting, genCloze,
    checkFC, recordMem, playAudio, dlPdf, saveRecord, doImport,
    goReview, restorePhase, showFlashcardEntry,
    submitInviteCode, handleClozeKey, handleClozeInput,
    checkClozeAnswer, generateReport, toggleGuide,
    updateWordCount: updateWC,
    downloadPdf: dlPdf,
    savePracticeRecord: saveRecord,
    importVocabulary: doImport,
});
</script>
